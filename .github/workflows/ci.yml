name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m compileall core controllers interfaces utils tests

      - name: Run tests
        run: python -m pytest -q

  governance:
    name: Repository governance files
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          test -f README.md
          test -f LICENSE
          test -f SECURITY.md
          test -f SUPPORT.md
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md
          test -f docs/ARCHITECTURE.md
          test -f docs/DUME_BRIDGE.md
          test -f docs/SAFETY_MODEL.md
          test -f docs/CONFIGURATION.md
          test -f docs/UNIVERSAL_SCOPE.md
          test -f docs/releases/v0.2.0.md
          test -f data/configs/README.md
          test -f data/configs/chevel.example.json
          test -f data/configs/voice.example.json
          test -f data/configs/dume.example.json
          test -f data/configs/robot-arm.example.json
          test -f data/configs/integrations.example.json
          test -f data/configs/safety.example.json
          test -f data/models/README.md
          test -f data/models/model-manifest.example.json
          test -f data/workflows/README.md
          test -f data/workflows/workflow-manifest.example.json
          test -f .github/PULL_REQUEST_TEMPLATE.md
          test -f .github/ISSUE_TEMPLATE/bug_report.yml
          test -f .github/ISSUE_TEMPLATE/feature_request.yml
          test -f .github/dependabot.yml

  native-optional:
    name: Optional C++ service build
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pybind11
        run: python -m pip install pybind11

      - name: Try native service build
        shell: pwsh
        run: |
          if (Test-Path ".\scripts\build_cpp_service.ps1") {
            try {
              powershell -ExecutionPolicy Bypass -File .\scripts\build_cpp_service.ps1
              if ($LASTEXITCODE -ne 0) {
                Write-Warning "Optional C++ service build skipped after exit code $LASTEXITCODE."
                exit 0
              }
            } catch {
              Write-Warning "Optional C++ service build skipped: $($_.Exception.Message)"
              exit 0
            }
          } else {
            Write-Host "No native service build script found; skipping optional C++ check."
          }
