name: Bug report
description: Report a reproducible CHEVEL AI bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this template for public bugs only. Do not include secrets, tokens, private hardware addresses, or security vulnerabilities.
  - type: input
    id: area
    attributes:
      label: Area
      description: Chat, API, cognitive core, native C++, Dum-E/U bridge, docs, or setup.
      placeholder: Chat
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start CHEVEL with ...
        2. Open ...
        3. Send ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Python:
        Ollama model:
        Browser:
    validations:
      required: false
